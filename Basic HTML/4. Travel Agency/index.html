<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Explore amazing travel destinations and packages around the world.">
  <title>Travel Agency Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>🌍 Explore the World</h1>
    <p>Discover incredible destinations and unique travel experiences tailored just for you.</p>
    <button id="toggleMode">🌙 Dark Mode</button>
  </header>

  <section>
    <h2>Packages</h2>
    <p>We offer a variety of travel packages to suit every kind of traveler.</p>

    <ul class="packages">
      <li>
        <a href="https://www.freecodecamp.org/learn" target="_blank">
          Group Travels
        </a>
      </li>
      <li>
        <a href="https://www.freecodecamp.org/learn" target="_blank">
          Private Tours
        </a>
      </li>
    </ul>
  </section>

  <section>
    <h2>Top Itineraries</h2>

    <div class="gallery">
      <figure>
        <a href="https://www.freecodecamp.org/learn" target="_blank">
          <img src="https://cdn.freecodecamp.org/curriculum/labs/colosseo.jpg" alt="Colosseum in Rome">
        </a>
        <figcaption>Visit the historic Colosseum in Rome</figcaption>
      </figure>

      <figure>
        <a href="https://www.freecodecamp.org/learn" target="_blank">
          <img src="https://cdn.freecodecamp.org/curriculum/labs/alps.jpg" alt="Alps mountains">
        </a>
        <figcaption>Experience the beauty of the Alps</figcaption>
      </figure>

      <figure>
        <a href="https://www.freecodecamp.org/learn" target="_blank">
          <img src="https://cdn.freecodecamp.org/curriculum/labs/sea.jpg" alt="Tropical sea">
        </a>
        <figcaption>Relax by the tropical sea</figcaption>
      </figure>
    </div>
  </section>

  <footer>
    <p>© 2026 Travel Agency | Designed by You ✨</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
